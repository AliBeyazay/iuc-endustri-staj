# ── Backend (Django + Gunicorn) ──────────────────────────────────────────────
# Railway Dashboard'da bu repo'yu bağladıktan sonra:
#   1. PostgreSQL plugin ekle  → DATABASE_URL otomatik set edilir
#   2. Redis plugin ekle       → REDIS_URL otomatik set edilir
#   3. Aşağıdaki env var'ları manuel ekle (Settings > Variables):
#
#   SECRET_KEY            = <openssl rand -base64 50>
#   APP_ENV               = prod
#   DJANGO_SETTINGS_MODULE= config.settings.prod
#   ALLOWED_HOSTS         = <railway-domain>.railway.app
#   CORS_ALLOWED_ORIGINS  = https://iuc-endustri-staj.vercel.app
#   FRONTEND_URL          = https://iuc-endustri-staj.vercel.app
#   DEFAULT_FROM_EMAIL    = noreply@iuc-staj.com
#   EMAIL_HOST_USER       = <gmail>
#   EMAIL_HOST_PASSWORD   = <gmail-app-password>
#   CV_STORAGE_BACKEND    = r2
#   R2_ACCOUNT_ID         = ...
#   R2_ACCESS_KEY_ID      = ...
#   R2_SECRET_ACCESS_KEY  = ...
#   R2_BUCKET_NAME        = iuc-staj-cvs
#   R2_PUBLIC_URL         = https://pub-xxxx.r2.dev

[build]
dockerfilePath = "backend/Dockerfile"
buildContext    = "backend"
watchPatterns   = ["backend/**"]

[deploy]
# startCommand belirtme — Dockerfile CMD olan start-production.sh çalışır:
#   migrate → ensure_admin → reset_password → verify_students → gunicorn
healthcheckPath    = "/health"
healthcheckTimeout = 300
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 10
