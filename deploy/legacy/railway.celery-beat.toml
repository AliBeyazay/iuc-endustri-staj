# ── Celery Beat (zamanlayıcı) ─────────────────────────────────────────────────
# Railway Dashboard'da backend servisinin yanına yeni bir servis ekle:
#   New Service → GitHub Repo (aynı repo)
#   Settings > Deploy > Config File Path = railway.celery-beat.toml
#
# Env var'ları backend servisiyle aynı — Railway'de "Reference Variable" kullan.
# UYARI: Bu servisten sadece 1 replica çalıştır (Beat singleton olmalı).

[build]
dockerfilePath = "backend/Dockerfile.scraper"
buildContext    = "backend"
watchPatterns   = ["backend/**"]

[deploy]
startCommand = "celery -A config beat --loglevel=warning --scheduler django_celery_beat.schedulers:DatabaseScheduler"
restartPolicyType       = "ON_FAILURE"
restartPolicyMaxRetries = 10
